# ============================================================
# Docker Compose — AI Observability Platform
# Phase 2: Data Infrastructure
#
# Starts all 7 infrastructure services:
#   1. prometheus        (9090)  — metrics scraping
#   2. loki              (3100)  — log aggregation
#   3. zipkin            (9411)  — distributed tracing
#   4. postgres          (5432)  — incidents DB (TimescaleDB + PgVector)
#   5. redis             (6379)  — metric cache + feed cache
#   6. zookeeper         (2181)  — Kafka dependency
#   7. kafka             (9092)  — event streaming
#   8. init-kafka        (one-shot) — creates the 3 required topics
#
# Usage:
#   docker compose up -d                   # Start all services
#   docker compose down                    # Stop + remove containers
#   docker compose down -v                 # Stop + remove containers + volumes
#   docker compose logs -f kafka           # Follow a specific service's logs
#   ./infrastructure/scripts/verify-infra.sh  # Run verification checks
#
# Note: The 4 Spring Boot services (gateway/search/media/recommendation)
#       run on the HOST machine during development. They are Dockerized in Phase 5.
#       Prometheus reaches them via 172.17.0.1 (Docker bridge gateway).
# ============================================================

services:

  # ══════════════════════════════════════════════════════════
  # 1. PROMETHEUS — Metrics Scraping
  # Polls /actuator/prometheus on all 4 Spring Boot services
  # every 15 seconds.
  # ══════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ai-observability-prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"   # No conflict — OK
    volumes:
      # Scrape configuration
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Persistent metric storage (survives restarts)
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # Keep 15 days of metric data locally
      - '--storage.tsdb.retention.time=15d'
      # Enable hot-reload of config (no restart needed)
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ══════════════════════════════════════════════════════════
  # 2. GRAFANA LOKI — Log Aggregation
  # Receives logs from Loki4j Logback appenders in all 4 services.
  # Query logs via: http://localhost:3100/loki/api/v1/query
  # ══════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:3.3.2
    container_name: ai-observability-loki
    hostname: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
      - "9096:9096"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ══════════════════════════════════════════════════════════
  # 3. ZIPKIN — Distributed Tracing
  # Receives spans from Micrometer Tracing (Brave reporter)
  # in all 4 Spring Boot services.
  # In-memory storage — traces are lost on restart (dev mode).
  # UI: http://localhost:9411
  # ══════════════════════════════════════════════════════════
  zipkin:
    image: openzipkin/zipkin:3.4.3
    container_name: ai-observability-zipkin
    hostname: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      # In-memory storage for development (no external DB needed)
      - STORAGE_TYPE=mem
      # Increase sample limit for demo purposes
      - MEM_MAX_SPANS=500000
      - JAVA_OPTS=-Xms256m -Xmx512m
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9411/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ══════════════════════════════════════════════════════════
  # 4. POSTGRESQL + TIMESCALEDB + PGVECTOR
  # Main database for: incidents, AI analysis results,
  # alert rules, service registry, anomaly history (hypertable),
  # and incident embeddings (PgVector RAG).
  #
  # Init script runs automatically on first start:
  #   infrastructure/postgres/init.sql
  # ══════════════════════════════════════════════════════════
  postgres:
    image: timescale/timescaledb-ha:pg16-all
    container_name: ai-observability-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      # Native PostgreSQL 17 is running on 5432 → use 5433 on host
      - "5433:5432"
    environment:
      POSTGRES_DB: observability_db
      POSTGRES_USER: observability
      POSTGRES_PASSWORD: observability123
      # TimescaleDB telemetry — disable in dev
      TIMESCALEDB_TELEMETRY: 'off'
    volumes:
      # Persistent database storage
      - postgres_data:/var/lib/postgresql/data
      # Auto-run init.sql on first container start
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - observability-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observability -d observability_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ══════════════════════════════════════════════════════════
  # 5. REDIS — Metric Cache + Feed Cache
  # Used by:
  #   - ai-engine (Phase 3): metric snapshot cache (TTL 60s)
  #   - service-recommendation: feed cache (TTL 5 min)
  # Key schema:
  #   metrics:{service}:cpu    → latest CPU %
  #   metrics:{service}:heap   → latest heap %
  #   feed:{userId}            → JSON feed string
  # ══════════════════════════════════════════════════════════
  redis:
    image: redis:7.4-alpine
    container_name: ai-observability-redis
    hostname: redis
    restart: unless-stopped
    ports:
      # Native Redis may be on 6379 → use 6380 on host
      - "6380:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      # Enable persistence (RDB snapshot every 60s if 1+ key changed)
      - --save
      - "60"
      - "1"
      # AOF for extra durability
      - --appendonly
      - "yes"
      # Max memory: 512MB (suitable for dev)
      - --maxmemory
      - "512mb"
      # Evict least-recently-used keys when maxmemory is reached
      - --maxmemory-policy
      - "allkeys-lru"
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ══════════════════════════════════════════════════════════
  # 6. ZOOKEEPER — Kafka Dependency
  # Required by Kafka for cluster coordination.
  # Health check uses zkServer.sh (always present in Confluent image)
  # — avoids dependency on nc/netcat which is not installed.
  # ══════════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: ai-observability-zookeeper
    hostname: zookeeper
    restart: unless-stopped
    ports:
      # Native Zookeeper is running on 2181 → remap to 2182 on host
      - "2182:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      # Remap admin server to avoid conflict with native ZK admin (port 8080)
      ZOOKEEPER_ADMIN_SERVER_PORT: 9080
      # Disable admin server entirely (not needed in dev)
      ZOOKEEPER_ADMIN_ENABLE_SERVER: "false"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - observability-net
    healthcheck:
      # 'cub zk-ready' is the Confluent Utility Belt command built into all
      # Confluent images — purpose-built for checking Zookeeper readiness
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "5"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ══════════════════════════════════════════════════════════
  # 7. KAFKA — Event Streaming
  # Broker for anomaly-events, error-events, deploy-events topics.
  # Two listeners:
  #   - PLAINTEXT (29092): internal Docker container communication
  #   - PLAINTEXT_HOST (9092): host machine access (Spring Boot services)
  # ══════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: ai-observability-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"   # No conflict — OK
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Two listeners:
      # - PLAINTEXT for inter-container communication (used by init-kafka)
      # - PLAINTEXT_HOST for host machine Spring Boot services (port 9092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Replication settings (single broker — dev mode)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Performance tuning for development
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # topics created by init-kafka

      # Log retention: 7 days
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_TOOLS_LOG4J_LOGLEVEL: WARN
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - observability-net
    healthcheck:
      # 'cub kafka-ready' is the Confluent Utility Belt command built into all
      # Confluent images — purpose-built for checking broker readiness.
      # Args: NUM_BROKERS  TIMEOUT_SECS  BOOTSTRAP_SERVER
      test: ["CMD", "cub", "kafka-ready", "-b", "localhost:9092", "1", "10"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ══════════════════════════════════════════════════════════
  # 8. INIT-KAFKA — One-Shot Topic Creation
  # Runs once after Kafka is healthy and creates the 3 topics:
  #   - anomaly-events  (3 partitions)
  #   - error-events    (3 partitions)
  #   - deploy-events   (1 partition)
  # Exits after completing — does not stay running.
  # ══════════════════════════════════════════════════════════
  init-kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: ai-observability-init-kafka
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."

        kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic anomaly-events --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        echo "Created: anomaly-events (3 partitions)"

        kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic error-events --partitions 3 --replication-factor 1 \
          --config retention.ms=604800000
        echo "Created: error-events (3 partitions)"

        kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists \
          --topic deploy-events --partitions 1 --replication-factor 1 \
          --config retention.ms=2592000000
        echo "Created: deploy-events (1 partition)"

        echo "All topics created. Listing..."
        kafka-topics.sh --bootstrap-server kafka:29092 --list
        echo "Kafka initialisation complete."
    networks:
      - observability-net
    restart: "no"   # one-shot — exit after completion


# ══════════════════════════════════════════════════════════
# NETWORKS
# All services communicate on the same bridge network.
# Spring Boot services on the HOST reach Kafka/Redis/Postgres
# via localhost (port mappings above).
# ══════════════════════════════════════════════════════════
networks:
  observability-net:
    driver: bridge
    name: ai-observability-network

# ══════════════════════════════════════════════════════════
# VOLUMES
# Named volumes persist data across container restarts.
# Run 'docker compose down -v' to wipe all data.
# ══════════════════════════════════════════════════════════
volumes:
  prometheus_data:
    name: ai-observability-prometheus-data
  loki_data:
    name: ai-observability-loki-data
  postgres_data:
    name: ai-observability-postgres-data
  redis_data:
    name: ai-observability-redis-data
  zookeeper_data:
    name: ai-observability-zookeeper-data
  zookeeper_logs:
    name: ai-observability-zookeeper-logs
  kafka_data:
    name: ai-observability-kafka-data
