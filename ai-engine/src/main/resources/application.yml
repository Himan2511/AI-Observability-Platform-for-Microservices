server:
  port: 8080

spring:
  application:
    name: ai-engine

  # PostgreSQL + TimescaleDB (Docker container — port 5433 on host, native PG on 5432)
  datasource:
    url: jdbc:postgresql://localhost:5433/observability_db
    username: observability
    password: observability123
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6380   # Docker Redis mapped to 6380 (native Redis on 6379)
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ai-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Spring AI — Gemini configuration (Phase 3)
  ai:
    openai:
      api-key: ${GOOGLE_GEMINI_API_KEY:AIzaSyCHcDzwDBYk7yxsCwsJze1UNCPAqYVD3ag}
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-1.5-pro

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# Monitored service URLs (used by Prometheus scraper in Phase 3)
monitored:
  services:
    gateway:
      base-url: http://localhost:8081
    search:
      base-url: http://localhost:8082
    media:
      base-url: http://localhost:8083
    recommendation:
      base-url: http://localhost:8084

prometheus:
  base-url: http://localhost:9090

logging:
  level:
    com.monitor.aiengine: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
