server:
  port: 8082

spring:
  application:
    name: service-search
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# Search service configuration
search:
  dataset:
    size: 100000           # Number of in-memory documents
  slow-query-threshold-ms: 500    # Queries above this are "slow"
  slow-query-kafka-threshold-ms: 2000  # Publish to Kafka if query exceeds this

logging:
  level:
    com.monitor.search: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
