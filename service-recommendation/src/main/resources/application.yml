server:
  port: 8084

spring:
  application:
    name: service-recommendation
  data:
    redis:
      host: localhost
      port: 6380   # Docker Redis mapped to 6380 (native Redis occupies 6379)
      timeout: 2000ms
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# Recommendation configuration
recommendation:
  dataset:
    size: 10000           # Number of content items in dataset
  cache:
    ttl-minutes: 5        # Redis feed cache TTL
    miss-rate-threshold: 0.70  # Publish Kafka event if miss rate > 70%
  feed:
    size: 20              # Default feed size per user

logging:
  level:
    com.monitor.recommendation: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
